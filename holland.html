<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holland 職業性向測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --R: #E8521A;
    --I: #2563EB;
    --A: #9333EA;
    --S: #16A34A;
    --E: #CA8A04;
    --C: #0891B2;
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --text: #1C1917;
    --text2: #57534E;
    --text3: #A8A29E;
    --border: #E7E5E4;
    --radius: 12px;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── COVER ── */
  #cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    text-align: center;
    background: #111;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  #cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 110%, #1e3a5f 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 20% -10%, #3b1d5e 0%, transparent 60%);
  }
  .cover-hex {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: min(600px, 90vw);
    opacity: 0.07;
  }
  .cover-content { position: relative; z-index: 1; max-width: 580px; }
  .cover-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #94A3B8;
    margin-bottom: 1.5rem;
  }
  .cover-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 1rem;
  }
  .cover-title span { color: #60A5FA; }
  .cover-desc {
    font-size: 1rem;
    color: #CBD5E1;
    line-height: 1.8;
    margin-bottom: 2.5rem;
  }
  .btn-start {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: #fff;
    color: #111;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.875rem 2.5rem;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .cover-types {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 3rem;
  }
  .cover-badge {
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.3rem 0.85rem;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.65);
  }

  /* ── QUIZ ── */
  #quiz { display: none; min-height: 100vh; padding: 2rem 1rem 4rem; }
  .quiz-inner { max-width: 680px; margin: 0 auto; }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 2.5rem;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2563EB, #9333EA);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .question-group {
    display: none;
    animation: fadeUp 0.35s ease both;
  }
  .question-group.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.75rem;
  }
  .group-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .group-label {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    font-weight: 500;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .q-card:hover { border-color: #A8A29E; }
  .q-card.selected { border-color: var(--accent); background: var(--accent-bg); }

  .q-check {
    width: 22px; height: 22px; flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--border);
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .q-card.selected .q-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .q-check svg { display: none; }
  .q-card.selected .q-check svg { display: block; }
  .q-text { font-size: 0.95rem; line-height: 1.6; color: var(--text); }

  .quiz-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2rem;
  }
  .btn-nav {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.7rem 1.75rem;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    background: transparent;
    color: var(--text);
    transition: all 0.15s;
  }
  .btn-nav:hover { border-color: #78716C; }
  .btn-nav.primary {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .btn-nav.primary:hover { background: #292524; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-count { font-size: 0.85rem; color: var(--text3); }

  /* ── RESULT ── */
  #result { display: none; padding: 2rem 1rem 4rem; }
  .result-inner { max-width: 760px; margin: 0 auto; }

  .result-hero {
    background: #111;
    color: #fff;
    border-radius: 20px;
    padding: 3rem 2.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .result-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 120%, var(--hero-color, #1e3a5f) 0%, transparent 70%);
  }
  .result-hero > * { position: relative; }
  .result-eyebrow { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: #94A3B8; margin-bottom: 0.75rem; }
  .result-type-code {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .result-type-name {
    font-size: 1.1rem;
    color: #CBD5E1;
    margin-bottom: 1.5rem;
  }
  .result-summary {
    font-size: 0.95rem;
    color: #94A3B8;
    line-height: 1.8;
    max-width: 480px;
    margin: 0 auto;
  }

  .hexagon-chart {
    display: flex;
    justify-content: center;
    margin: 2rem 0;
  }

  .scores-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .score-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .score-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .score-num { font-size: 1.25rem; font-weight: 700; }
  .score-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
  .score-sub { font-size: 0.75rem; color: var(--text3); }

  .career-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1.5rem;
  }
  .career-section h3 {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 1.25rem;
    font-weight: 500;
  }
  .career-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .career-tag {
    font-size: 0.85rem;
    padding: 0.35rem 0.9rem;
    border-radius: 100px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  .trait-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .trait-list li {
    font-size: 0.9rem;
    color: var(--text2);
    padding-left: 1.25rem;
    position: relative;
    line-height: 1.6;
  }
  .trait-list li::before {
    content: '';
    position: absolute;
    left: 0; top: 0.5em;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-color, #888);
  }

  .btn-restart {
    display: block;
    width: fit-content;
    margin: 2rem auto 0;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.75rem 2rem;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-restart:hover { border-color: #78716C; color: var(--text); }

  /* SVG hex chart */
  .hex-svg { overflow: visible; }
</style>
</head>
<body>

<!-- ═══ COVER ═══ -->
<section id="cover">
  <svg class="cover-hex" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="200,20 370,110 370,290 200,380 30,290 30,110" stroke="white" stroke-width="1.5"/>
    <polygon points="200,60 340,135 340,265 200,340 60,265 60,135" stroke="white" stroke-width="0.8"/>
  </svg>
  <div class="cover-content">
    <p class="cover-eyebrow">Holland RIASEC · 職業性向</p>
    <h1 class="cover-title">探索你的<br><span>職業方向</span></h1>
    <p class="cover-desc">
      根據 John Holland 的職業人格理論，<br>
      回答 36 道題目，找出最適合你的職業類型與發展方向。
    </p>
    <button class="btn-start" onclick="startQuiz()">
      開始測驗
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <div class="cover-types">
      <span class="cover-badge">R 實用型</span>
      <span class="cover-badge">I 研究型</span>
      <span class="cover-badge">A 藝術型</span>
      <span class="cover-badge">S 社會型</span>
      <span class="cover-badge">E 企業型</span>
      <span class="cover-badge">C 事務型</span>
    </div>
  </div>
</section>

<!-- ═══ QUIZ ═══ -->
<section id="quiz">
  <div class="quiz-inner">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div id="groups-container"></div>
    <div class="quiz-nav">
      <button class="btn-nav" id="btn-prev" onclick="prevGroup()">← 上一組</button>
      <span class="page-count" id="page-count"></span>
      <button class="btn-nav primary" id="btn-next" onclick="nextGroup()">下一組 →</button>
    </div>
  </div>
</section>

<!-- ═══ RESULT ═══ -->
<section id="result">
  <div class="result-inner">
    <div class="result-hero" id="result-hero">
      <p class="result-eyebrow">你的 Holland 類型</p>
      <div class="result-type-code" id="result-code"></div>
      <div class="result-type-name" id="result-name"></div>
      <p class="result-summary" id="result-summary"></p>
    </div>

    <div class="hexagon-chart">
      <svg class="hex-svg" id="hex-svg" width="320" height="300" viewBox="0 0 320 300"></svg>
    </div>

    <div class="scores-grid" id="scores-grid"></div>

    <div class="career-section" id="traits-section">
      <h3>人格特質</h3>
      <ul class="trait-list" id="traits-list"></ul>
    </div>

    <div class="career-section" id="careers-section">
      <h3>適合職業方向</h3>
      <div class="career-tags" id="careers-tags"></div>
    </div>

    <button class="btn-restart" onclick="restart()">↺ 重新測驗</button>
  </div>
</section>

<script>
const TYPES = {

    traits: ['動手能力強，喜愛實際操作', '踏實務實，追求具體成果', '偏好戶外或機械相關環境', '自給自足，獨立性強', '不喜歡繁複的社交場合'],

  // R

  // C
  { type:'C', text:'我喜歡有條理地整理資料、檔案或報表' },
  { type:'C', text:'我在有明確規則與程序的環境中工作得最好' },
  { type:'C', text:'我注重精確性，不允許自己犯錯' },
  { type:'C', text:'我擅長處理數字、表格或行政事務' },
  { type:'C', text:'我覺得維持秩序與一致性非常重要' },
  { type:'C', text:'我喜歡照著計畫執行，而不喜歡臨時變動' },
];

const TYPE_ORDER = ['R','I','A','S','E','C'];
const GROUPS = [];
for(let i=0; i<36; i+=6) GROUPS.push(QUESTIONS.slice(i,i+6));

let currentGroup = 0;
let answers = {}; // questionIndex -> bool

function startQuiz(){
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  buildGroups();
  showGroup(0);
}

function buildGroups(){
  const container = document.getElementById('groups-container');
  const typeColors = Object.fromEntries(TYPE_ORDER.map(t=>[t,TYPES[t].color]));
  GROUPS.forEach((group, gi)=>{
    const t = TYPE_ORDER[gi];
    const div = document.createElement('div');
    div.className = 'question-group';
    div.id = `group-${gi}`;
    div.innerHTML = `
      <div class="group-header">
        <div class="group-dot" style="background:${TYPES[t].color}"></div>
        <span class="group-label">${TYPES[t].name}</span>
      </div>
      ${group.map((q, qi)=>{
        const idx = gi*6+qi;
        return `<div class="q-card" id="q-${idx}" 
          style="--accent:${TYPES[t].color};--accent-bg:${TYPES[t].bg}"
          onclick="toggleAnswer(${idx}, this)">
          <div class="q-check">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="q-text">${q.text}</span>
        </div>`;
      }).join('')}
    `;
    container.appendChild(div);
  });
}

function toggleAnswer(idx, el){
  if(answers[idx]){
    delete answers[idx];
    el.classList.remove('selected');
  } else {
    answers[idx] = true;
    el.classList.add('selected');
  }
}

function showGroup(i){
  document.querySelectorAll('.question-group').forEach(g=>g.classList.remove('active'));
  document.getElementById(`group-${i}`).classList.add('active');
  const pct = ((i+1)/GROUPS.length)*100;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('page-count').textContent = `${i+1} / ${GROUPS.length}`;
  document.getElementById('btn-prev').disabled = i===0;
  const isLast = i===GROUPS.length-1;
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = isLast ? '查看結果 ✓' : '下一組 →';
  currentGroup = i;
}

function prevGroup(){ if(currentGroup>0) showGroup(currentGroup-1); }
function nextGroup(){
  if(currentGroup<GROUPS.length-1){ showGroup(currentGroup+1); }
  else { showResult(); }
}

function computeScores(){
  const scores = {R:0,I:0,A:0,S:0,E:0,C:0};
  QUESTIONS.forEach((q,idx)=>{ if(answers[idx]) scores[q.type]++; });
  return scores;
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';

  const scores = computeScores();
  const sorted = TYPE_ORDER.slice().sort((a,b)=>scores[b]-scores[a]);
  const top = sorted[0];
  const second = sorted[1];
  const code = top + (scores[top]===scores[second]&&second!==top ? second : (scores[second]>0?second:''));

  const T = TYPES[top];

  // Hero
  document.getElementById('result-hero').style.setProperty('--hero-color', top==='R'?'#7c2d12':top==='I'?'#1e3a5f':top==='A'?'#3b1d5e':top==='S'?'#14532d':top==='E'?'#713f12':'#164e63');
  document.getElementById('result-code').textContent = code;
  document.getElementById('result-name').textContent = T.name;
  document.getElementById('result-summary').textContent = T.summary;

  // Hex radar chart
  drawHexRadar(scores);

  // Score cards
  const grid = document.getElementById('scores-grid');
  grid.innerHTML = '';
  const max = Math.max(...Object.values(scores), 1);
  TYPE_ORDER.forEach(t=>{
    const s = scores[t]; const pct = Math.round(s/6*100);
    grid.innerHTML += `<div class="score-card">
      <div class="score-card-top">
        <div class="score-label">
          <div class="score-dot" style="background:${TYPES[t].color}"></div>
          ${TYPES[t].name}
        </div>
        <span class="score-num" style="color:${TYPES[t].color}">${s}</span>
      </div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:${TYPES[t].color}"></div></div>
      <div class="score-sub">${pct}% 符合度</div>
    </div>`;
  });

  // Traits
  const ul = document.getElementById('traits-list');
  ul.style.setProperty('--accent-color', T.color);
  ul.innerHTML = T.traits.map(tr=>`<li>${tr}</li>`).join('');

  // Careers
  const tagsEl = document.getElementById('careers-tags');
  tagsEl.innerHTML = T.careers.map(c=>`<span class="career-tag">${c}</span>`).join('');
}

function drawHexRadar(scores){
  const svg = document.getElementById('hex-svg');
  const cx=160, cy=150, r=110;
  const labels = ['R','I','A','S','E','C'];
  const angles = labels.map((_,i)=> (i*60 - 90) * Math.PI/180);

  function pt(angle, radius){ return [cx + radius*Math.cos(angle), cy + radius*Math.sin(angle)]; }

  let html = '';
  // Background grid
  [0.25,0.5,0.75,1].forEach(f=>{
    const pts = angles.map(a=>pt(a,r*f)).map(p=>p.join(',')).join(' ');
    html += `<polygon points="${pts}" fill="none" stroke="#E7E5E4" stroke-width="1"/>`;
  });
  // Axis lines
  angles.forEach(a=>{
    const [x2,y2]=pt(a,r);
    html += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#E7E5E4" stroke-width="1"/>`;
  });

  // Data polygon
  const maxQ = 6;
  const dataPts = labels.map((t,i)=>{
    const frac = scores[t]/maxQ;
    return pt(angles[i], r*frac);
  });
  const dpStr = dataPts.map(p=>p.join(',')).join(' ');
  const topColor = labels.reduce((a,b)=>scores[a]>=scores[b]?a:b);
  html += `<polygon points="${dpStr}" fill="${TYPES[topColor].color}" fill-opacity="0.18" stroke="${TYPES[topColor].color}" stroke-width="2"/>`;

  // Dots
  dataPts.forEach(([x,y],i)=>{
    const t = labels[i];
    html += `<circle cx="${x}" cy="${y}" r="5" fill="${TYPES[t].color}"/>`;
  });

  // Labels
  labels.forEach((t,i)=>{
    const [lx,ly] = pt(angles[i], r+24);
    const anchor = lx<cx-5?'end':lx>cx+5?'start':'middle';
    html += `<text x="${lx}" y="${ly+5}" text-anchor="${anchor}" font-family="'Noto Sans TC',sans-serif" font-size="13" font-weight="500" fill="${TYPES[t].color}">${t}</text>`;
  });

  svg.innerHTML = html;
}

function restart(){
  answers={};
  currentGroup=0;
  document.getElementById('result').style.display='none';
  document.getElementById('groups-container').innerHTML='';
  document.getElementById('cover').style.display='flex';
}
</script>
</body>
</html>
